<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maybelline Lumi Matte</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;700&family=Barlow:wght@300;500;700&family=Montserrat:wght@300;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./styles/styles.css">
</head>

<body>
    <div id="es-rc">
        <div id="es-rc-content">
            <div class="es-kv">
                <div class="es-kv__bg">
                    <img src="./images/bg-kv.png" alt="">
                </div>
                <div class="es-kv__headline">
                    <p class="es-kv__headline--top">Super stay</p>
                    <p class="es-kv__headline--bottom">Lumi matte</p>
                </div>
                <div class="es-kv__packshot">
                    <img src="./images/kv-packshot.jpg" alt="">
                </div>
            </div>

            <div class="es-benefits">

                <div class="es-benefits__photo">
                    <div class="es-benefits__wrapper">
                        <div class="es-benefits__headline">
                            <p class="es-benefits__headline--top">Podkład super stay</p>
                            <p class="es-benefits__headline--bottom">Lumi matte</p>
                        </div>

                        <div class="es-benefits__flexwrapper">
                            <div class="es-benefits__single">
                                <img src="./images/check.png" alt="">
                                <p>Efekt satynowego matu</p>
                            </div>
                            <div class="es-benefits__single">
                                <img src="./images/check.png" alt="">
                                <p>Lekka formuła</p>
                            </div>
                            <div class="es-benefits__single">
                                <img src="./images/check.png" alt="">
                                <p>Mocne krycie bez&nbsp;efektu maski</p>
                            </div>
                        </div>


                    </div>
                    <picture>
                        <source media="(min-width:500px)" srcset="./images/benefits-photo-desktop.jpg">
                        <img src="./images/benefits-photo.jpg" alt="">
                    </picture>
                </div>
                <div class="es-benefits__bg">
                    <img src="./images/benefits-packs.png" alt="" class="es-benefits__packs">
                    <img src="./images/bg-benefits.png" alt="">
                </div>

            </div>

            <div class="es-features">
                <div class="es-features__icons">
                    <div class="es-features__icon">
                        <img src="./images/icon-heat.png" alt="">
                    </div>
                    <div class="es-features__icon">
                        <img src="./images/icon-transfer.png" alt="">
                    </div>
                    <div class="es-features__icon">
                        <img src="./images/icon-sweat.png" alt="">
                    </div>
                    <div class="es-features__icon">
                        <img src="./images/icon-water.png" alt="">
                    </div>
                </div>
                <div class="es-features__img">
                    <img src="./images/bg-icons.png" alt="">
                </div>
            </div>

            <div class="es-colors">
                <p class="es-colors__header es-title">Wybierz swój odcień</p>

                <div class="es-colors__wrapper">
                    <div class="es-colors__single">
                        <div class="es-colors__imgContainer">
                            <img src="./images/01-maz.png" alt="" class="es-colors__maz">
                            <img src="./images/01-product.png" alt="" class="es-colors__prod">
                        </div>
                        <p class="es-colors__single--text">090 WARM</p>
                    </div>
                    <div class="es-colors__single">
                        <div class="es-colors__imgContainer">
                            <img src="./images/02-maz.png" alt="" class="es-colors__maz">
                            <img src="./images/02-product.png" alt="" class="es-colors__prod">
                        </div>
                        <p class="es-colors__single--text">098 WARM</p>
                    </div>
                    <div class="es-colors__single">
                        <div class="es-colors__imgContainer">
                            <img src="./images/03-maz.png" alt="" class="es-colors__maz">
                            <img src="./images/03-product.png" alt="" class="es-colors__prod">
                        </div>
                        <p class="es-colors__single--text">108 COOL</p>
                    </div>
                    <div class="es-colors__single">
                        <div class="es-colors__imgContainer">
                            <img src="./images/04-maz.png" alt="" class="es-colors__maz">
                            <img src="./images/04-product.png" alt="" class="es-colors__prod">
                        </div>
                        <p class="es-colors__single--text">115 COOL</p>
                    </div>
                    <div class="es-colors__single">
                        <div class="es-colors__imgContainer">
                            <img src="./images/05-maz.png" alt="" class="es-colors__maz">
                            <img src="./images/05-product.png" alt="" class="es-colors__prod">
                        </div>
                        <p class="es-colors__single--text">118 WARM</p>
                    </div>
                    <div class="es-colors__single">
                        <div class="es-colors__imgContainer">
                            <img src="./images/06-maz.png" alt="" class="es-colors__maz">
                            <img src="./images/06-product.png" alt="" class="es-colors__prod">
                        </div>
                        <p class="es-colors__single--text">128 WARM</p>
                    </div>
                </div>
            </div>

            <div class="es-disclaimer">
                <p>*Test konsumencki, 120 osób</p>
            </div>

            <div class="es-footer">
                <img src="./images/logo.png" alt="Logo Maybelline New York">
            </div>
        </div>
    </div>
</body>

</html>
